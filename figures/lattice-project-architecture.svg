<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 560" role="img" aria-labelledby="title desc">
  <title id="title">Lattice High-Level Architecture</title>
  <desc id="desc">A minimalist high-level diagram showing how Lattice turns fragmented scientific sources into training-ready data and portable model workflows.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfcfd"/>
      <stop offset="100%" stop-color="#f4f7fa"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="12" stdDeviation="20" flood-color="#111827" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#9ca3af"/>
    </marker>
    <style>
      .title { font: 700 52px 'Inter','Segoe UI',Arial,sans-serif; fill: #111827; }
      .subtitle { font: 500 24px 'Inter','Segoe UI',Arial,sans-serif; fill: #4b5563; }
      .kicker { font: 700 12px 'Inter','Segoe UI',Arial,sans-serif; letter-spacing: 0.2em; fill: #6b7280; }
      .summary { font: 500 20px 'Inter','Segoe UI',Arial,sans-serif; fill: #374151; }
      .node-title { font: 700 24px 'Inter','Segoe UI',Arial,sans-serif; fill: #111827; }
      .node-copy { font: 600 15px 'Inter','Segoe UI',Arial,sans-serif; fill: #6b7280; }
      .chip { font: 700 15px 'Inter','Segoe UI',Arial,sans-serif; fill: #374151; }
      .pill { fill: rgba(255,255,255,0.96); stroke: #d9e1ea; stroke-width: 1.5; filter: url(#shadow); }
      .small-pill { fill: rgba(255,255,255,0.92); stroke: #e5e7eb; stroke-width: 1.25; }
      .flow { stroke: #9ca3af; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .motif { stroke: #c4ccd7; stroke-width: 2; fill: none; }
      .motif-node { fill: #ffffff; stroke: #9ca3af; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1400" height="560" fill="url(#bg)"/>

  <text x="72" y="70" class="kicker">OPEN-SOURCE DATA PLATFORM</text>
  <text x="72" y="126" class="title">Lattice</text>
  <text x="72" y="160" class="subtitle">Scientific sources to trainable models</text>
  <text x="72" y="218" class="summary">We collect fragmented scientific data, turn it into training-ready datasets, and run portable model workflows.</text>

  <path d="M1148 94 L1182 66 L1216 94 L1182 122 Z" class="motif"/>
  <path d="M1182 66 L1230 58 L1264 88 L1254 136 L1200 144 L1160 118 Z" class="motif"/>
  <line x1="1182" y1="66" x2="1200" y2="144" class="motif"/>
  <line x1="1230" y1="58" x2="1160" y2="118" class="motif"/>
  <line x1="1216" y1="94" x2="1254" y2="136" class="motif"/>
  <circle cx="1182" cy="66" r="5.5" class="motif-node"/>
  <circle cx="1230" cy="58" r="5.5" class="motif-node"/>
  <circle cx="1264" cy="88" r="5.5" class="motif-node"/>
  <circle cx="1254" cy="136" r="5.5" class="motif-node"/>
  <circle cx="1200" cy="144" r="5.5" class="motif-node"/>
  <circle cx="1160" cy="118" r="5.5" class="motif-node"/>

  <rect x="72" y="280" width="264" height="110" rx="26" class="pill"/>
  <text x="204" y="324" text-anchor="middle" class="node-title">Scientific sources</text>
  <text x="204" y="352" text-anchor="middle" class="node-copy">papers · materials DBs</text>
  <text x="204" y="374" text-anchor="middle" class="node-copy">chemistry · knowledge</text>

  <rect x="390" y="280" width="264" height="110" rx="26" class="pill"/>
  <text x="522" y="324" text-anchor="middle" class="node-title">Data foundation</text>
  <text x="522" y="352" text-anchor="middle" class="node-copy">connect · normalize</text>
  <text x="522" y="374" text-anchor="middle" class="node-copy">curate · release</text>

  <rect x="708" y="280" width="264" height="110" rx="26" class="pill"/>
  <text x="840" y="324" text-anchor="middle" class="node-title">Portable workflows</text>
  <text x="840" y="352" text-anchor="middle" class="node-copy">registry · replay</text>
  <text x="840" y="374" text-anchor="middle" class="node-copy">pandas · Spark · Flink</text>

  <rect x="1026" y="280" width="302" height="110" rx="26" class="pill"/>
  <text x="1177" y="324" text-anchor="middle" class="node-title">Training platform</text>
  <text x="1177" y="352" text-anchor="middle" class="node-copy">pretrain · continue · finetune</text>
  <text x="1177" y="374" text-anchor="middle" class="node-copy">post-train · model outputs</text>

  <line x1="336" y1="335" x2="390" y2="335" class="flow"/>
  <line x1="654" y1="335" x2="708" y2="335" class="flow"/>
  <line x1="972" y1="335" x2="1026" y2="335" class="flow"/>

  <rect x="430" y="442" width="160" height="34" rx="17" class="small-pill"/>
  <text x="510" y="464" text-anchor="middle" class="chip">open source</text>

  <rect x="620" y="442" width="160" height="34" rx="17" class="small-pill"/>
  <text x="700" y="464" text-anchor="middle" class="chip">local-first</text>

  <rect x="810" y="442" width="178" height="34" rx="17" class="small-pill"/>
  <text x="899" y="464" text-anchor="middle" class="chip">reproducible</text>
</svg>
