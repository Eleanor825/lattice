<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 940" role="img" aria-labelledby="title desc">
  <title id="title">Lattice Platform Overview</title>
  <desc id="desc">A minimalist overview of Lattice from scientific sources to data foundation, runtime, training, and reproducible outputs.</desc>
  <defs>
    <linearGradient id="pageBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbfcfe"/>
      <stop offset="100%" stop-color="#f3f6fb"/>
    </linearGradient>
    <radialGradient id="orbBlue" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dbeafe" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#dbeafe" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="orbMint" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#dcfce7" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#dcfce7" stop-opacity="0"/>
    </radialGradient>
    <filter id="panelShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#0f172a" flood-opacity="0.07"/>
    </filter>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.04"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#94a3b8"/>
    </marker>
    <style>
      .hero-kicker { font: 700 13px 'Inter','Segoe UI',Arial,sans-serif; letter-spacing: 0.22em; fill: #64748b; }
      .hero-title { font: 700 54px 'Inter','Segoe UI',Arial,sans-serif; fill: #0f172a; }
      .hero-sub { font: 500 24px 'Inter','Segoe UI',Arial,sans-serif; fill: #475569; }
      .hero-pill { font: 700 14px 'Inter','Segoe UI',Arial,sans-serif; fill: #334155; }
      .section-chip { font: 700 13px 'Inter','Segoe UI',Arial,sans-serif; letter-spacing: 0.08em; }
      .section-title { font: 700 28px 'Inter','Segoe UI',Arial,sans-serif; fill: #0f172a; }
      .card-title { font: 700 21px 'Inter','Segoe UI',Arial,sans-serif; fill: #0f172a; }
      .card-copy { font: 600 15px 'Inter','Segoe UI',Arial,sans-serif; fill: #64748b; }
      .footer-chip { font: 700 18px 'Inter','Segoe UI',Arial,sans-serif; fill: #0f172a; }
      .panel { fill: rgba(255,255,255,0.92); stroke: #dde5ef; stroke-width: 1.5; filter: url(#panelShadow); }
      .hero-panel { fill: rgba(255,255,255,0.88); stroke: #d7e1ed; stroke-width: 1.5; filter: url(#panelShadow); }
      .card { fill: rgba(255,255,255,0.96); stroke: #d9e2ec; stroke-width: 1.25; filter: url(#softShadow); }
      .source-border { stroke: #f1b97a; }
      .phase1-border { stroke: #9dbbf8; }
      .runtime-border { stroke: #c0b4fb; }
      .phase2-border { stroke: #9de3bb; }
      .out-border { stroke: #cbd5e1; }
      .sources-chip-bg { fill: #fff5eb; }
      .phase1-chip-bg { fill: #edf4ff; }
      .runtime-chip-bg { fill: #f3f0ff; }
      .phase2-chip-bg { fill: #eefbf4; }
      .sources-chip-text { fill: #9a3412; }
      .phase1-chip-text { fill: #1d4ed8; }
      .runtime-chip-text { fill: #6d28d9; }
      .phase2-chip-text { fill: #0f766e; }
      .line { stroke: #c5ced9; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2.5; }
      .motif-line { stroke: #b7c8ff; stroke-width: 2; fill: none; }
      .motif-node { fill: #ffffff; stroke: #9bb1ff; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1400" height="940" fill="url(#pageBg)"/>
  <circle cx="1220" cy="82" r="140" fill="url(#orbBlue)"/>
  <circle cx="1290" cy="792" r="160" fill="url(#orbMint)"/>
  <circle cx="116" cy="864" r="140" fill="url(#orbBlue)" opacity="0.55"/>

  <rect x="56" y="34" width="1288" height="160" rx="34" class="hero-panel"/>
  <text x="92" y="82" class="hero-kicker">OPEN-SOURCE DATA PLATFORM</text>
  <text x="92" y="138" class="hero-title">Lattice</text>
  <text x="92" y="171" class="hero-sub">Scientific data → trainable models</text>

  <rect x="944" y="60" width="126" height="38" rx="19" fill="#f8fafc" stroke="#d9e2ec"/>
  <text x="1007" y="84" text-anchor="middle" class="hero-pill">Phase 1 ready</text>
  <rect x="1084" y="60" width="122" height="38" rx="19" fill="#f8fafc" stroke="#d9e2ec"/>
  <text x="1145" y="84" text-anchor="middle" class="hero-pill">Spark + Flink</text>
  <rect x="1220" y="60" width="88" height="38" rx="19" fill="#f8fafc" stroke="#d9e2ec"/>
  <text x="1264" y="84" text-anchor="middle" class="hero-pill">Rerun</text>

  <path d="M1120 136 L1160 104 L1200 136 L1160 168 Z" class="motif-line"/>
  <path d="M1160 104 L1220 92 L1260 128 L1244 188 L1178 198 L1132 166 Z" class="motif-line"/>
  <line x1="1160" y1="104" x2="1178" y2="198" class="motif-line"/>
  <line x1="1220" y1="92" x2="1132" y2="166" class="motif-line"/>
  <line x1="1200" y1="136" x2="1244" y2="188" class="motif-line"/>
  <circle cx="1160" cy="104" r="6" class="motif-node"/>
  <circle cx="1220" cy="92" r="6" class="motif-node"/>
  <circle cx="1260" cy="128" r="6" class="motif-node"/>
  <circle cx="1244" cy="188" r="6" class="motif-node"/>
  <circle cx="1178" cy="198" r="6" class="motif-node"/>
  <circle cx="1132" cy="166" r="6" class="motif-node"/>

  <rect x="56" y="230" width="1288" height="114" rx="28" class="panel"/>
  <rect x="84" y="256" width="108" height="28" rx="14" class="sources-chip-bg"/>
  <text x="138" y="275" text-anchor="middle" class="section-chip sources-chip-text">1 · SOURCES</text>
  <text x="84" y="316" class="section-title">Scientific sources</text>

  <rect x="84" y="286" width="382" height="48" rx="18" class="card source-border"/>
  <text x="275" y="307" text-anchor="middle" class="card-title">Papers</text>
  <text x="275" y="326" text-anchor="middle" class="card-copy">OpenAlex · Crossref · arXiv · Europe PMC</text>

  <rect x="509" y="286" width="382" height="48" rx="18" class="card source-border"/>
  <text x="700" y="307" text-anchor="middle" class="card-title">Materials DBs</text>
  <text x="700" y="326" text-anchor="middle" class="card-copy">Materials Project · OQMD · NOMAD · JARVIS</text>

  <rect x="934" y="286" width="382" height="48" rx="18" class="card source-border"/>
  <text x="1125" y="307" text-anchor="middle" class="card-title">Chemistry + knowledge</text>
  <text x="1125" y="326" text-anchor="middle" class="card-copy">PubChem · Wikidata · NIST · catalysis</text>

  <line x1="700" y1="344" x2="700" y2="378" class="line"/>
  <circle cx="700" cy="361" r="8" class="node"/>

  <rect x="56" y="378" width="1288" height="154" rx="28" class="panel"/>
  <rect x="84" y="404" width="114" height="28" rx="14" class="phase1-chip-bg"/>
  <text x="141" y="423" text-anchor="middle" class="section-chip phase1-chip-text">2 · PHASE 1</text>
  <text x="84" y="464" class="section-title">Data foundation</text>

  <rect x="84" y="448" width="284" height="60" rx="20" class="card phase1-border"/>
  <text x="226" y="472" text-anchor="middle" class="card-title">Connect</text>
  <text x="226" y="492" text-anchor="middle" class="card-copy">registry · adapters</text>

  <rect x="390" y="448" width="284" height="60" rx="20" class="card phase1-border"/>
  <text x="532" y="472" text-anchor="middle" class="card-title">Normalize</text>
  <text x="532" y="492" text-anchor="middle" class="card-copy">documents · records</text>

  <rect x="696" y="448" width="284" height="60" rx="20" class="card phase1-border"/>
  <text x="838" y="472" text-anchor="middle" class="card-title">Curate</text>
  <text x="838" y="492" text-anchor="middle" class="card-copy">lineage · license · dedup</text>

  <rect x="1002" y="448" width="314" height="60" rx="20" class="card phase1-border"/>
  <text x="1159" y="472" text-anchor="middle" class="card-title">Release</text>
  <text x="1159" y="492" text-anchor="middle" class="card-copy">views · manifests · workflow specs</text>

  <line x1="700" y1="532" x2="700" y2="566" class="line"/>
  <circle cx="700" cy="549" r="8" class="node"/>

  <rect x="56" y="566" width="1288" height="126" rx="28" class="panel"/>
  <rect x="84" y="592" width="116" height="28" rx="14" class="runtime-chip-bg"/>
  <text x="142" y="611" text-anchor="middle" class="section-chip runtime-chip-text">3 · RUNTIME</text>
  <text x="84" y="652" class="section-title">Platform control plane</text>

  <rect x="84" y="630" width="372" height="50" rx="18" class="card runtime-border"/>
  <text x="270" y="651" text-anchor="middle" class="card-title">Registry API</text>
  <text x="270" y="670" text-anchor="middle" class="card-copy">runs · datasets · backends</text>

  <rect x="514" y="630" width="372" height="50" rx="18" class="card runtime-border"/>
  <text x="700" y="651" text-anchor="middle" class="card-title">Replay</text>
  <text x="700" y="670" text-anchor="middle" class="card-copy">save spec · rerun · migrate</text>

  <rect x="944" y="630" width="372" height="50" rx="18" class="card runtime-border"/>
  <text x="1130" y="651" text-anchor="middle" class="card-title">Portable engines</text>
  <text x="1130" y="670" text-anchor="middle" class="card-copy">pandas · Spark · Flink</text>

  <line x1="700" y1="692" x2="700" y2="726" class="line"/>
  <circle cx="700" cy="709" r="8" class="node"/>

  <rect x="56" y="726" width="1288" height="158" rx="28" class="panel"/>
  <rect x="84" y="752" width="114" height="28" rx="14" class="phase2-chip-bg"/>
  <text x="141" y="771" text-anchor="middle" class="section-chip phase2-chip-text">4 · PHASE 2</text>
  <text x="84" y="812" class="section-title">Training</text>

  <rect x="84" y="796" width="532" height="56" rx="20" class="card phase2-border"/>
  <text x="350" y="819" text-anchor="middle" class="card-title">Training workflows</text>
  <text x="350" y="840" text-anchor="middle" class="card-copy">pretrain · continue · finetune · post-train</text>

  <rect x="652" y="796" width="286" height="56" rx="20" class="card phase2-border"/>
  <text x="795" y="819" text-anchor="middle" class="card-title">Model backends</text>
  <text x="795" y="840" text-anchor="middle" class="card-copy">local · HF open · external closed</text>

  <rect x="974" y="796" width="342" height="56" rx="20" class="card phase2-border"/>
  <text x="1145" y="819" text-anchor="middle" class="card-title">Run outputs</text>
  <text x="1145" y="840" text-anchor="middle" class="card-copy">checkpoints · metrics · manifests</text>

  <rect x="278" y="856" width="248" height="32" rx="16" class="card out-border"/>
  <text x="402" y="877" text-anchor="middle" class="footer-chip">Reusable data</text>
  <rect x="560" y="856" width="212" height="32" rx="16" class="card out-border"/>
  <text x="666" y="877" text-anchor="middle" class="footer-chip">Trained models</text>
  <rect x="806" y="856" width="314" height="32" rx="16" class="card out-border"/>
  <text x="963" y="877" text-anchor="middle" class="footer-chip">Reproducible runs</text>
</svg>
