<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 920" role="img" aria-labelledby="title desc">
  <title id="title">Lattice Project Architecture</title>
  <desc id="desc">A monochrome project architecture diagram for Lattice, covering sources, data foundation, runtime, and training.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#f3f5f7"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="22" flood-color="#0f172a" flood-opacity="0.06"/>
    </filter>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="8" stdDeviation="14" flood-color="#0f172a" flood-opacity="0.04"/>
    </filter>
    <marker id="arrow" viewBox="0 0 12 12" refX="10" refY="6" markerWidth="12" markerHeight="12" orient="auto-start-reverse">
      <path d="M1 1 L11 6 L1 11 Z" fill="#8b95a7"/>
    </marker>
    <style>
      .title { font: 700 52px 'Inter','Segoe UI',Arial,sans-serif; fill: #111827; }
      .subtitle { font: 500 24px 'Inter','Segoe UI',Arial,sans-serif; fill: #4b5563; }
      .kicker { font: 700 13px 'Inter','Segoe UI',Arial,sans-serif; letter-spacing: 0.22em; fill: #6b7280; }
      .section-chip { font: 700 13px 'Inter','Segoe UI',Arial,sans-serif; letter-spacing: 0.08em; fill: #6b7280; }
      .section-title { font: 700 28px 'Inter','Segoe UI',Arial,sans-serif; fill: #111827; }
      .card-title { font: 700 22px 'Inter','Segoe UI',Arial,sans-serif; fill: #111827; }
      .card-copy { font: 600 15px 'Inter','Segoe UI',Arial,sans-serif; fill: #6b7280; }
      .footer-chip { font: 700 18px 'Inter','Segoe UI',Arial,sans-serif; fill: #111827; }
      .hero { fill: rgba(255,255,255,0.96); stroke: #d8dee6; stroke-width: 1.5; filter: url(#shadow); }
      .panel { fill: rgba(255,255,255,0.96); stroke: #dde3ea; stroke-width: 1.5; filter: url(#shadow); }
      .card { fill: #ffffff; stroke: #d9e0e8; stroke-width: 1.25; filter: url(#soft); }
      .accent { stroke: #94a3b8; stroke-width: 3; fill: none; marker-end: url(#arrow); stroke-linecap: round; }
      .node { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2.5; }
      .motif-line { stroke: #c2cad6; stroke-width: 2; fill: none; }
      .motif-node { fill: #ffffff; stroke: #9aa5b5; stroke-width: 2; }
    </style>
  </defs>

  <rect width="1400" height="920" fill="url(#bg)"/>

  <rect x="56" y="32" width="1288" height="146" rx="32" class="hero"/>
  <text x="92" y="78" class="kicker">OPEN-SOURCE DATA PLATFORM</text>
  <text x="92" y="132" class="title">Lattice</text>
  <text x="92" y="164" class="subtitle">Project architecture</text>

  <path d="M1126 118 L1164 88 L1202 118 L1164 148 Z" class="motif-line"/>
  <path d="M1164 88 L1218 78 L1258 110 L1246 164 L1186 174 L1140 144 Z" class="motif-line"/>
  <line x1="1164" y1="88" x2="1186" y2="174" class="motif-line"/>
  <line x1="1218" y1="78" x2="1140" y2="144" class="motif-line"/>
  <line x1="1202" y1="118" x2="1246" y2="164" class="motif-line"/>
  <circle cx="1164" cy="88" r="6" class="motif-node"/>
  <circle cx="1218" cy="78" r="6" class="motif-node"/>
  <circle cx="1258" cy="110" r="6" class="motif-node"/>
  <circle cx="1246" cy="164" r="6" class="motif-node"/>
  <circle cx="1186" cy="174" r="6" class="motif-node"/>
  <circle cx="1140" cy="144" r="6" class="motif-node"/>

  <rect x="56" y="212" width="1288" height="112" rx="28" class="panel"/>
  <rect x="84" y="236" width="108" height="28" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="138" y="255" text-anchor="middle" class="section-chip">1 · SOURCES</text>
  <text x="84" y="294" class="section-title">Scientific inputs</text>

  <rect x="84" y="266" width="382" height="46" rx="18" class="card"/>
  <text x="275" y="286" text-anchor="middle" class="card-title">Papers</text>
  <text x="275" y="305" text-anchor="middle" class="card-copy">OpenAlex · Crossref · arXiv · Europe PMC</text>

  <rect x="509" y="266" width="382" height="46" rx="18" class="card"/>
  <text x="700" y="286" text-anchor="middle" class="card-title">Materials DBs</text>
  <text x="700" y="305" text-anchor="middle" class="card-copy">Materials Project · OQMD · NOMAD · JARVIS</text>

  <rect x="934" y="266" width="382" height="46" rx="18" class="card"/>
  <text x="1125" y="286" text-anchor="middle" class="card-title">Chemistry + knowledge</text>
  <text x="1125" y="305" text-anchor="middle" class="card-copy">PubChem · Wikidata · NIST · catalysis</text>

  <line x1="700" y1="324" x2="700" y2="356" class="accent"/>
  <circle cx="700" cy="340" r="8" class="node"/>

  <rect x="56" y="356" width="1288" height="144" rx="28" class="panel"/>
  <rect x="84" y="380" width="114" height="28" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="141" y="399" text-anchor="middle" class="section-chip">2 · PHASE 1</text>
  <text x="84" y="438" class="section-title">Data foundation</text>

  <rect x="84" y="424" width="284" height="58" rx="18" class="card"/>
  <text x="226" y="447" text-anchor="middle" class="card-title">Connect</text>
  <text x="226" y="467" text-anchor="middle" class="card-copy">registry · adapters</text>

  <rect x="390" y="424" width="284" height="58" rx="18" class="card"/>
  <text x="532" y="447" text-anchor="middle" class="card-title">Normalize</text>
  <text x="532" y="467" text-anchor="middle" class="card-copy">documents · records</text>

  <rect x="696" y="424" width="284" height="58" rx="18" class="card"/>
  <text x="838" y="447" text-anchor="middle" class="card-title">Curate</text>
  <text x="838" y="467" text-anchor="middle" class="card-copy">lineage · dedup · license</text>

  <rect x="1002" y="424" width="314" height="58" rx="18" class="card"/>
  <text x="1159" y="447" text-anchor="middle" class="card-title">Release</text>
  <text x="1159" y="467" text-anchor="middle" class="card-copy">views · manifests · workflow specs</text>

  <line x1="700" y1="500" x2="700" y2="532" class="accent"/>
  <circle cx="700" cy="516" r="8" class="node"/>

  <rect x="56" y="532" width="1288" height="116" rx="28" class="panel"/>
  <rect x="84" y="556" width="116" height="28" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="142" y="575" text-anchor="middle" class="section-chip">3 · RUNTIME</text>
  <text x="84" y="614" class="section-title">Control plane</text>

  <rect x="84" y="590" width="372" height="46" rx="18" class="card"/>
  <text x="270" y="610" text-anchor="middle" class="card-title">Registry API</text>
  <text x="270" y="629" text-anchor="middle" class="card-copy">runs · datasets · backends</text>

  <rect x="514" y="590" width="372" height="46" rx="18" class="card"/>
  <text x="700" y="610" text-anchor="middle" class="card-title">Replay</text>
  <text x="700" y="629" text-anchor="middle" class="card-copy">save spec · rerun · migrate</text>

  <rect x="944" y="590" width="372" height="46" rx="18" class="card"/>
  <text x="1130" y="610" text-anchor="middle" class="card-title">Portable engines</text>
  <text x="1130" y="629" text-anchor="middle" class="card-copy">pandas · Spark · Flink</text>

  <line x1="700" y1="648" x2="700" y2="680" class="accent"/>
  <circle cx="700" cy="664" r="8" class="node"/>

  <rect x="56" y="680" width="1288" height="176" rx="28" class="panel"/>
  <rect x="84" y="704" width="114" height="28" rx="14" fill="#f8fafc" stroke="#e5e7eb"/>
  <text x="141" y="723" text-anchor="middle" class="section-chip">4 · PHASE 2</text>
  <text x="84" y="762" class="section-title">Training</text>

  <rect x="84" y="744" width="532" height="56" rx="20" class="card"/>
  <text x="350" y="767" text-anchor="middle" class="card-title">Training workflows</text>
  <text x="350" y="788" text-anchor="middle" class="card-copy">pretrain · continue · finetune · post-train</text>

  <rect x="652" y="744" width="286" height="56" rx="20" class="card"/>
  <text x="795" y="767" text-anchor="middle" class="card-title">Model backends</text>
  <text x="795" y="788" text-anchor="middle" class="card-copy">local · HF open · external closed</text>

  <rect x="974" y="744" width="342" height="56" rx="20" class="card"/>
  <text x="1145" y="767" text-anchor="middle" class="card-title">Run outputs</text>
  <text x="1145" y="788" text-anchor="middle" class="card-copy">checkpoints · metrics · manifests</text>

  <rect x="278" y="812" width="248" height="34" rx="17" class="card"/>
  <text x="402" y="834" text-anchor="middle" class="footer-chip">Reusable data</text>
  <rect x="560" y="812" width="212" height="34" rx="17" class="card"/>
  <text x="666" y="834" text-anchor="middle" class="footer-chip">Trained models</text>
  <rect x="806" y="812" width="314" height="34" rx="17" class="card"/>
  <text x="963" y="834" text-anchor="middle" class="footer-chip">Reproducible runs</text>
</svg>
